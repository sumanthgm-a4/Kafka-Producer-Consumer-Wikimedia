spring:
    application:
        name: kafka-wikimedia-producer

    config:
        import:
            - optional:file:.env[.properties]

    kafka:
        bootstrap-servers:
            - localhost:9092

        producer:
            key-serializer: org.apache.kafka.common.serialization.StringSerializer
            value-serializer: org.apache.kafka.common.serialization.StringSerializer

server:
    port: 7070